name: Validate ChartForge source

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: npm
      - name: Audit repository and release assets
        run: node scripts/audit-release.mjs
      - name: Install locked development dependencies
        run: npm ci --ignore-scripts
      - name: Run complete regression suite
        run: npm test
